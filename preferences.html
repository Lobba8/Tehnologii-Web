<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coș de Cumpărături – Laborator 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">

<nav>
  <span class="logo">Lab3 &lt;HTTP/&gt;</span>
  <ul>
    <li><a href="index.html">Acasă</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="cart.html" class="active">🛒 Coș</a></li>
    <li><a href="preferences.html">Preferințe</a></li>
  </ul>
  <button class="theme-toggle" id="themeToggle">🌙</button>
</nav>

<div class="container">
  <div class="page-header">
    <h1>🛒 Coș de Cumpărături</h1>
    <p>Coșul este stocat în <strong>sessionStorage</strong> – se golește la închiderea tab-ului</p>
  </div>

  <div id="alertArea"></div>

  <!-- PRODUCTS -->
  <div class="card">
    <h2>Produse Disponibile</h2>
    <div class="product-grid" id="productGrid"></div>

    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
      <div class="form-group" style="margin-bottom:0;flex:1;min-width:160px;">
        <label for="productSelect">Produs</label>
        <select id="productSelect"></select>
      </div>
      <div class="form-group" style="margin-bottom:0;width:100px;">
        <label for="qty">Cantitate</label>
        <input type="number" id="qty" min="1" max="10" value="1">
      </div>
      <button class="btn btn-primary" id="addBtn">+ Adaugă în Coș</button>
    </div>
  </div>

  <!-- CART -->
  <div class="card">
    <h2>Coșul Meu <span class="badge" id="cartBadge">0 produse</span></h2>
    <table>
      <thead>
        <tr><th>Produs</th><th>Cantitate</th><th>Preț unitar</th><th>Subtotal</th><th>Acțiune</th></tr>
      </thead>
      <tbody id="cartTbody"></tbody>
    </table>
    <div class="cart-total" id="cartTotal" style="display:none">
      Total: <span id="totalValue">0</span> RON
    </div>
    <div class="actions-row" style="margin-top:16px">
      <button class="btn btn-danger" id="clearCartBtn">🗑️ Golește Coșul</button>
      <button class="btn btn-outline" onclick="renderCart()">🔄 Reîncarcă</button>
    </div>
  </div>
</div>

<script src="js/cookies.js"></script>
<script src="js/storage.js"></script>
<script>
  // Auth check
  const session = StorageManager.getSession('userSession');
  if (!session) { window.location.href = 'login.html'; }

  document.body.className = CookieManager.get('theme') || 'light';
  document.getElementById('themeToggle').textContent = document.body.className === 'dark' ? '☀️' : '🌙';

  const products = {
    laptop:  { name: 'Laptop',   price: 2500, icon: '💻' },
    telefon: { name: 'Telefon',  price: 1200, icon: '📱' },
    tableta: { name: 'Tabletă',  price: 800,  icon: '📟' },
    casti:   { name: 'Căști',    price: 150,  icon: '🎧' }
  };

  // Build product grid & select
  const grid = document.getElementById('productGrid');
  const sel = document.getElementById('productSelect');
  Object.entries(products).forEach(([key, p]) => {
    grid.innerHTML += `
      <div class="product-card">
        <div>${p.icon} <strong>${p.name}</strong></div>
        <div class="price">${p.price} RON</div>
      </div>`;
    sel.innerHTML += `<option value="${key}">${p.icon} ${p.name} – ${p.price} RON</option>`;
  });

  function getCart() {
    return StorageManager.getSession('cart') || {};
  }

  function saveCart(cart) {
    StorageManager.setSession('cart', cart);
  }

  function showAlert(msg, type) {
    const a = document.getElementById('alertArea');
    a.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => a.innerHTML = '', 2500);
  }

  function renderCart() {
    const cart = getCart();
    const keys = Object.keys(cart).filter(k => cart[k] > 0);
    const tbody = document.getElementById('cartTbody');
    const totalDiv = document.getElementById('cartTotal');
    const badge = document.getElementById('cartBadge');

    if (!keys.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Coșul este gol 🛒</td></tr>';
      totalDiv.style.display = 'none';
      badge.textContent = '0 produse';
      return;
    }

    let total = 0;
    let totalQty = 0;
    tbody.innerHTML = keys.map(k => {
      const p = products[k];
      const qty = cart[k];
      const sub = p.price * qty;
      total += sub;
      totalQty += qty;
      return `
        <tr>
          <td>${p.icon} ${p.name}</td>
          <td>${qty}</td>
          <td>${p.price} RON</td>
          <td><strong>${sub} RON</strong></td>
          <td><button class="btn btn-danger btn-sm" onclick="removeItem('${k}')">Șterge</button></td>
        </tr>`;
    }).join('');

    document.getElementById('totalValue').textContent = total;
    totalDiv.style.display = 'block';
    badge.textContent = totalQty + ' produs' + (totalQty !== 1 ? 'e' : '');
  }

  function removeItem(key) {
    const cart = getCart();
    delete cart[key];
    saveCart(cart);
    renderCart();
    showAlert('Produsul a fost eliminat din coș.', 'success');
  }

  document.getElementById('addBtn').addEventListener('click', () => {
    const key = document.getElementById('productSelect').value;
    const qty = parseInt(document.getElementById('qty').value);
    if (qty < 1 || qty > 10) { showAlert('Cantitatea trebuie să fie între 1 și 10.', 'error'); return; }

    const cart = getCart();
    cart[key] = (cart[key] || 0) + qty;
    if (cart[key] > 10) cart[key] = 10;
    saveCart(cart);
    renderCart();
    showAlert(`✅ ${products[key].name} (x${qty}) adăugat în coș!`, 'success');
  });

  document.getElementById('clearCartBtn').addEventListener('click', () => {
    saveCart({});
    renderCart();
    showAlert('Coșul a fost golit.', 'success');
  });

  document.getElementById('themeToggle').addEventListener('click', () => {
    const next = document.body.className === 'light' ? 'dark' : 'light';
    CookieManager.set('theme', next);
    document.body.className = next;
    document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
  });

  renderCart();
</script>
</body>
</html>
