<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autentificare – Laborator 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">

<div class="auth-wrap">
  <div class="auth-card">
    <h1>🔐 Autentificare</h1>
    <p class="subtitle">Intră în contul tău pentru a accesa dashboard-ul</p>

    <div id="alertArea"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="admin sau student" autocomplete="username">
    </div>

    <div class="form-group">
      <label for="password">Parolă</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="rememberMe">
      <label for="rememberMe" style="margin-bottom:0;font-weight:400;">Ține-mă minte</label>
    </div>

    <button class="btn btn-primary" style="width:100%" id="loginBtn">→ Autentifică-te</button>

    <div class="auth-link">
      Nu ai cont? <a href="register.html">Înregistrează-te</a>
    </div>

    <div style="margin-top:16px;padding:12px;background:var(--table-head);border-radius:8px;font-size:0.82rem;color:var(--muted);">
      <strong>Conturi de test:</strong><br>
      admin / password<br>
      student / student123
    </div>
  </div>
</div>

<script src="js/cookies.js"></script>
<script src="js/storage.js"></script>
<script>
  // Apply theme
  document.body.className = CookieManager.get('theme') || 'light';

  // Init default users if none exist
  if (!StorageManager.getLocal('users')) {
    StorageManager.setLocal('users', [
      { id: 1, username: 'admin', password: 'password', email: 'admin@example.com' },
      { id: 2, username: 'student', password: 'student123', email: 'student@example.com' }
    ]);
  }

  // Pre-fill remembered username
  const remembered = StorageManager.getLocal('rememberedUser');
  if (remembered) {
    document.getElementById('username').value = remembered;
    document.getElementById('rememberMe').checked = true;
  }

  function showAlert(msg, type) {
    document.getElementById('alertArea').innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
  }

  document.getElementById('loginBtn').addEventListener('click', () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('rememberMe').checked;

    if (!username || !password) {
      showAlert('⚠️ Completați toate câmpurile.', 'error');
      return;
    }

    const users = StorageManager.getLocal('users') || [];
    const user = users.find(u => u.username === username && u.password === password);

    if (!user) {
      showAlert('❌ Username sau parolă incorectă.', 'error');
      return;
    }

    // Remember me
    if (remember) {
      StorageManager.setLocal('rememberedUser', username);
    } else {
      StorageManager.removeLocal('rememberedUser');
    }

    // Create session
    const session = {
      userId: user.id,
      username: user.username,
      email: user.email,
      loginTime: new Date().toISOString(),
      sessionId: Math.random().toString(36).substring(2) + Date.now().toString(36)
    };
    StorageManager.setSession('userSession', session);

    // Set cookie for display name
    CookieManager.set('username', user.username, 1);

    showAlert('✅ Autentificare reușită! Redirecționare…', 'success');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
  });

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });
</script>
</body>
</html>
